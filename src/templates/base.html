<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Nightmare Designs AI Cam Master{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Nosifer&display=swap"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  {% block head %}{% endblock %}
</head>
<body class="nightmare-body">

<canvas id="matrix-bg" aria-hidden="true"></canvas>

<!-- ── Sidebar ──────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">☠️</div>
    <div>
      <h1>Nightmare</h1>
      <span>Designs AI Cam</span>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a href="/"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
    <a href="/cameras"><span class="nav-icon">📷</span><span>Cameras</span></a>
    <a href="/events"><span class="nav-icon">🔔</span><span>Events</span></a>
    <a href="/settings"><span class="nav-icon">⚙️</span><span>Settings</span></a>
    <a href="/docs" target="_blank"><span class="nav-icon">📄</span><span>API Docs</span></a>
  </nav>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────── -->
<main class="main">
  <div class="blood-banner">
    <h1 class="blood-title">Nightmare Designs AI Cam Master</h1>
    <p class="blood-subtitle">In the green rain, every movement leaves a trace.</p>
  </div>
  {% block topbar %}{% endblock %}
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</main>

<div id="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/vendor-logins.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
