{% extends "base.html" %}

{% block title %}Events — AI-Cam{% endblock %}

{% block topbar %}
<div class="topbar">
  <span class="topbar-title">Event Timeline</span>
  <div class="topbar-right" style="gap:8px;flex-wrap:wrap">
    <select id="filter-camera" class="btn btn-ghost btn-sm" style="cursor:pointer">
      <option value="">All cameras</option>
    </select>
    <select id="filter-type" class="btn btn-ghost btn-sm" style="cursor:pointer">
      <option value="">All types</option>
      <option value="object_detected">Object Detected</option>
      <option value="motion">Motion</option>
    </select>
    <select id="filter-class" class="btn btn-ghost btn-sm" style="cursor:pointer">
      <option value="">All classes</option>
      <option value="person">Person</option>
      <option value="car">Car</option>
      <option value="truck">Truck</option>
      <option value="bus">Bus</option>
      <option value="motorcycle">Motorcycle</option>
      <option value="bicycle">Bicycle</option>
      <option value="dog">Dog</option>
      <option value="cat">Cat</option>
    </select>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Snapshot</th>
          <th>Camera</th>
          <th>Type</th>
          <th>Confidence</th>
          <th>Time</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="events-tbody">
        <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>
  <div style="text-align:center;padding:16px 0 4px">
    <button id="btn-load-more" class="btn btn-ghost" style="display:none">Load more</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/events.js"></script>
{% endblock %}
