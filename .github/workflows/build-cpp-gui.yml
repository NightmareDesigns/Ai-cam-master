name: Build C++ GUI Executable

on:
  push:
    branches: [ main, claude/build-cpp-gui-exe ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.*'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qtnetworkauth qtwebsockets qtmultimedia'

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: |
        cd cpp-gui
        cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build C++ GUI
      run: |
        cd cpp-gui
        cmake --build build --config Release

    - name: Package Python Backend
      run: |
        pyinstaller --onefile --hidden-import=uvicorn --hidden-import=fastapi --hidden-import=ultralytics --collect-all ultralytics --collect-all cv2 --add-data "src;src" --name aicam-backend run.py

    - name: Bundle Application
      run: |
        cd cpp-gui/build/Release
        windeployqt ai-cam-gui.exe
        mkdir bundle
        xcopy ai-cam-gui.exe bundle\ /Y
        xcopy *.dll bundle\ /Y /S
        xcopy ..\..\..\dist\aicam-backend.exe bundle\ /Y
        xcopy ..\..\..\src\static bundle\static\ /Y /S /I

    - name: Create Installer
      run: |
        choco install nsis -y
        cd cpp-gui
        makensis installer.nsi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-cam-windows-x64
        path: cpp-gui/AI-Cam-Setup-Windows.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          qt6-base-dev \
          qt6-multimedia-dev \
          libqt6networkauth6-dev \
          qt6-websockets-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          python3-dev \
          python3-pip \
          libfuse2

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Configure CMake
      run: |
        cd cpp-gui
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build C++ GUI
      run: |
        cd cpp-gui
        cmake --build build

    - name: Package Python Backend
      run: |
        pyinstaller --onefile --hidden-import=uvicorn --hidden-import=fastapi --hidden-import=ultralytics --collect-all ultralytics --collect-all cv2 --add-data "src:src" --name aicam-backend run.py

    - name: Create AppImage
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy*.AppImage
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        cp cpp-gui/build/ai-cam-gui AppDir/usr/bin/
        cp dist/aicam-backend AppDir/usr/bin/
        cp -r src/static AppDir/usr/share/aicam/
        cp cpp-gui/resources/ai-cam.desktop AppDir/usr/share/applications/
        cp cpp-gui/resources/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ai-cam.png
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-cam-linux-x64
        path: AI_Cam-*.AppImage

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt
      run: |
        brew install qt@6
        echo "Qt6_DIR=$(brew --prefix qt@6)" >> $GITHUB_ENV

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Configure CMake
      run: |
        cd cpp-gui
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

    - name: Build C++ GUI
      run: |
        cd cpp-gui
        cmake --build build

    - name: Package Python Backend
      run: |
        pyinstaller --onefile --hidden-import=uvicorn --hidden-import=fastapi --hidden-import=ultralytics --collect-all ultralytics --collect-all cv2 --add-data "src:src" --name aicam-backend run.py

    - name: Create .app bundle
      run: |
        cd cpp-gui/build
        macdeployqt ai-cam-gui.app -dmg
        mkdir -p ai-cam-gui.app/Contents/MacOS/backend
        cp ../../dist/aicam-backend ai-cam-gui.app/Contents/MacOS/backend/
        cp -r ../../src/static ai-cam-gui.app/Contents/Resources/
        hdiutil create -volname "AI-Cam" -srcfolder ai-cam-gui.app -ov -format UDZO AI-Cam-macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-cam-macos
        path: cpp-gui/build/AI-Cam-macOS.dmg

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ai-cam-windows-x64/AI-Cam-Setup-Windows.exe
          ai-cam-linux-x64/AI_Cam-*.AppImage
          ai-cam-macos/AI-Cam-macOS.dmg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
